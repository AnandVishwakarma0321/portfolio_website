  <!-- Styling for loading indicator -->
  <style>
    body {
      background: #0a192f;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .loading-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0a192f;
      z-index: 999999;
      transition: opacity 0.6s ease;
    }

    .loader-box {
      position: relative;
      width: 100px;
      height: 100px;
    }

    .loader-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: #64ffda;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .loader-circle:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border-top-color: rgba(100, 255, 218, 0.5);
      animation-duration: 0.8s;
      animation-direction: reverse;
    }

    .loader-circle:nth-child(3) {
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      border-top-color: #64ffda;
      animation-duration: 0.5s;
    }

    .loading-title {
      margin-top: 30px;
      color: #ccd6f6;
      font-family: 'Inter', 'Roboto', sans-serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.8;
      animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeInOut {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.95);
      }

      50% {
        opacity: 0.8;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <!-- Loading indicator — hidden once Flutter fires its first frame -->
  <div id="loading-wrapper" class="loading-wrapper">
    <div class="loader-box">
      <div class="loader-circle"></div>
      <div class="loader-circle"></div>
      <div class="loader-circle"></div>
    </div>
    <div class="loading-title">Loading</div>
  </div>

  <!--
    flutter_bootstrap.js is auto-generated by `flutter build web`.
    It contains _flutter.buildConfig and calls _flutter.loader.load() itself.
    We MUST NOT call _flutter.loader.load() again — doing so causes a second
    conflicting initialisation that prevents the app from launching on GitHub Pages.

    Instead we listen for the "flutter-first-frame" event which Flutter dispatches
    after the very first frame is rendered, and use that to dismiss the loader.
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-wrapper');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function () { loader.remove(); }, 650);
      }
    });
  </script>

  <!-- Flutter bootstrap — handles all engine initialisation automatically -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
